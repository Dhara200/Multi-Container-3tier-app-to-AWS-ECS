name: Build Scan Push ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-scan-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Show Repository Structure
      run: |
        pwd
        ls -la
        ls -la Backend
        ls -la Frontend
        ls -la Nginx
        ls -la Mysql

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    ####################################################
    # BUILD IMAGES
    ####################################################

    - name: Build Backend Image
      run: |
        docker build -t backend:${{ github.sha }} ./Backend

    - name: Build Frontend Image
      run: |
        docker build -t frontend:${{ github.sha }} ./Frontend

    - name: Build Nginx Image
      run: |
        docker build -t nginx:${{ github.sha }} ./Nginx

    - name: Build Mysql Image
      run: |
        docker build -t mysql:${{ github.sha }} ./Mysql

    ####################################################
    # BACKEND TRIVY
    ####################################################

    - name: Backend Trivy Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: backend:${{ github.sha }}
        format: table
        output: backend-trivy-report.txt
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Upload Backend Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-trivy-report
        path: backend-trivy-report.txt

    ####################################################
    # FRONTEND TRIVY
    ####################################################

    - name: Frontend Trivy Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: frontend:${{ github.sha }}
        format: table
        output: frontend-trivy-report.txt
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Upload Frontend Report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-trivy-report
        path: frontend-trivy-report.txt

    ####################################################
    # NGINX TRIVY
    ####################################################

    - name: Nginx Trivy Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: nginx:${{ github.sha }}
        format: table
        output: nginx-trivy-report.txt
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Upload Nginx Report
      uses: actions/upload-artifact@v4
      with:
        name: nginx-trivy-report
        path: nginx-trivy-report.txt

    ####################################################
    # MYSQL TRIVY
    ####################################################

    - name: Mysql Trivy Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: mysql:${{ github.sha }}
        format: table
        output: mysql-trivy-report.txt
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Upload Mysql Report
      uses: actions/upload-artifact@v4
      with:
        name: mysql-trivy-report
        path: mysql-trivy-report.txt

    ####################################################
    # VULNERABILITY GATES
    ####################################################

    - name: Backend Vulnerability Gate
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: backend:${{ github.sha }}
        format: table
        exit-code: '1'
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Frontend Vulnerability Gate
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: frontend:${{ github.sha }}
        format: table
        exit-code: '1'
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Nginx Vulnerability Gate
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: nginx:${{ github.sha }}
        format: table
        exit-code: '1'
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    - name: Mysql Vulnerability Gate
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: mysql:${{ github.sha }}
        format: table
        exit-code: '1'
        severity: HIGH,CRITICAL
        ignore-unfixed: true

    ####################################################
    # TAG IMAGES
    ####################################################

    - name: Tag Backend
      run: |
        docker tag backend:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

    - name: Tag Frontend
      run: |
        docker tag frontend:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

    - name: Tag Nginx
      run: |
        docker tag nginx:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_NGINX_REPO }}:${{ github.sha }}

    - name: Tag Mysql
      run: |
        docker tag mysql:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_MYSQL_REPO }}:${{ github.sha }}

    ####################################################
    # PUSH TO ECR
    ####################################################

    - name: Push Backend
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

    - name: Push Frontend
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

    - name: Push Nginx
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_NGINX_REPO }}:${{ github.sha }}

    - name: Push Mysql
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_MYSQL_REPO }}:${{ github.sha }}

    - name: Success
      run: |
        echo "All images scanned and pushed successfully"
